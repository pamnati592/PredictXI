apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-frontend
spec:
  replicas: {{ .Values.replicaCount.frontend }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-frontend
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-frontend
    spec:
      initContainers:
        - name: wait-for-backend
          image: busybox
          command: ['sh', '-c', 'until wget -q --spider http://{{ .Release.Name }}-backend:8000/health; do echo waiting for backend; sleep 3; done']
      containers:
        - name: frontend
          image: {{ .Values.images.frontend }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            limits:
              cpu: "200m"
              memory: "128Mi"
