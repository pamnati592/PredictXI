apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-postgres-policy
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}-postgres
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: {{ .Release.Name }}-backend
      ports:
        - port: 5432
  policyTypes:
    - Ingress
